{# organizer_actions_partial.html #}
{% if message %}
  <div class="p-3 rounded bg-gray-50 text-sm text-gray-700">{{ message }}</div>
{% endif %}

{% if actions %}
  <div class="mt-3">
    <h4 class="text-sm font-medium mb-2">Actions</h4>
    <ul class="space-y-1 text-sm">
      {% for src, tgt in actions %}
        <li class="flex items-center justify-between">
          <span class="truncate">{{ src }}</span>
          <span class="text-xs text-gray-500">→ {{ tgt }}</span>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endif %}

<script>
  (function(){
    // Use tojson so the produced JS is syntactically valid
    const _msg = {{ message|tojson if message else 'null' }};
    if (_msg) {
      showToast(_msg);
    }
  })();
</script>
