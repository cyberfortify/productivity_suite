{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl bg-white p-6 rounded-lg shadow">
  <div class="flex items-start justify-between">
    <div>
      <h2 class="text-2xl font-semibold">{{ note.title }}</h2>
      <p class="mt-2 text-gray-600 whitespace-pre-wrap">{{ note.body }}</p>
      <div class="mt-3 text-sm text-indigo-600">{{ note.tags }}</div>
    </div>
    <div class="text-right">
      <a class="inline-block px-3 py-2 bg-gray-100 rounded" href="/notes/{{ note.id }}/edit">Edit</a>
      <form method="post" action="/notes/{{ note.id }}/delete" class="inline">
        <button class="inline-block px-3 py-2 bg-red-500 text-white rounded">Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
