{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-2xl font-semibold">Notes</h2>
  <a class="inline-flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded shadow hover:bg-indigo-500" href="/notes/add">+ Add note</a>
</div>

<div class="mb-4">
  <form id="notes-search" hx-get="/notes/search" hx-target="#notes-list" hx-trigger="keyup changed delay:500ms" class="flex gap-2">
    <input name="q" placeholder="Search notes..." class="flex-1 rounded border px-3 py-2" />
    <button type="submit" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">Search</button>
  </form>
</div>

<!-- notes list placeholder (will be replaced by HTMX partial) -->
<div id="notes-list">
  {% for n in notes %}
  <article class="bg-white p-4 rounded-lg shadow-sm hover:shadow-md transition">
    <div class="flex items-start justify-between gap-4">
      <div>
        <a href="/notes/{{ n.id }}" class="text-lg font-medium">{{ n.title }}</a>
        <p class="text-sm text-gray-500 mt-1">{{ n.body[:160] }}{% if n.body|length > 160 %}...{% endif %}</p>
      </div>
      <div class="text-right text-sm text-gray-400">
        <div>{{ n.created_at }}</div>
        <div class="mt-2 text-xs text-indigo-600">{{ n.tags }}</div>
      </div>
    </div>
  </article>
  {% else %}
  <div class="bg-white p-6 rounded-lg shadow text-gray-500">No notes yet. Create your first note.</div>
  {% endfor %}
</div>
{% endblock %}
