{# calc_result_partial.html #}
{% if result is defined %}
  <div class="bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 rounded-xl p-4 md:p-6 animate-fade-in">
    <div class="flex items-center justify-between">
      <div class="text-sm font-medium text-green-800">Result</div>
      <button 
        onclick="copyToClipboard('{{ result }}')"
        class="text-green-600 hover:text-green-800 transition-colors p-1 rounded"
        title="Copy to clipboard"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
      </button>
    </div>
    <div class="text-2xl md:text-3xl font-bold text-green-900 mt-2 font-mono">{{ result }}</div>
    
    <!-- Expression preview -->
    <div class="mt-3 pt-3 border-t border-green-200">
      <div class="text-xs text-green-700 opacity-75">Expression:</div>
      <div class="text-sm font-mono text-green-800 mt-1">{{ expr }}</div>
    </div>
  </div>
{% elif error is defined %}
  <div class="bg-red-50 border border-red-200 rounded-xl p-4 md:p-6 animate-fade-in">
    <div class="flex items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-600 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <div class="text-sm font-medium text-red-800">Calculation Error</div>
    </div>
    <div class="text-red-700 mt-2 font-mono">{{ error }}</div>
    
    <!-- Expression that caused error -->
    <div class="mt-3 pt-3 border-t border-red-200">
      <div class="text-xs text-red-700 opacity-75">Expression:</div>
      <div class="text-sm font-mono text-red-800 mt-1">{{ expr }}</div>
    </div>
  </div>
{% endif %}

<script>
  (function(){
    // Do not show any toast here.
    // The main calc.html script will handle success/error notifications and recent storage.
  })();

  // Copy to clipboard helper (still needed for the button inside partial)
  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      if (typeof showToast === "function") {
        showToast('Result copied to clipboard!', 'success');
      }
    }).catch(err => {
      console.error('Failed to copy:', err);
      if (typeof showToast === "function") {
        showToast('Failed to copy result', 'error');
      }
    });
  }
</script>


<style>
  .animate-fade-in {
    animation: fadeIn 0.3s ease-in-out;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
