{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Create New Note</h1>
    <p class="text-gray-600 mt-1">Add a new note to your collection</p>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="p-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
    <form method="post" action="/notes/add" class="p-6 space-y-6">
      <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-2">Title</label>
        <input 
          id="title"
          name="title" 
          required 
          placeholder="Enter a descriptive title"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 transition-colors" 
        />
      </div>
      
      <div>
        <label for="body" class="block text-sm font-medium text-gray-700 mb-2">Content</label>
        <textarea 
          id="body"
          name="body" 
          rows="8" 
          placeholder="Write your note content here..."
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 transition-colors resize-vertical"
        ></textarea>
      </div>
      
      <div>
        <label for="tags" class="block text-sm font-medium text-gray-700 mb-2">
          Tags <span class="text-gray-500 font-normal">(comma separated)</span>
        </label>
        <input 
          id="tags"
          name="tags" 
          placeholder="work, ideas, personal"
          class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-200 focus:border-indigo-500 transition-colors" 
        />
        <p class="text-xs text-gray-500 mt-2">Add relevant tags to help organize your notes</p>
      </div>
      
      <div class="flex flex-col sm:flex-row gap-3 pt-4">
        <button 
          type="submit" 
          class="flex-1 sm:flex-none px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium rounded-lg shadow-sm hover:shadow-md transition-all hover:from-indigo-700 hover:to-purple-700"
        >
          Save Note
        </button>
        <a 
          href="/notes" 
          class="flex-1 sm:flex-none px-6 py-3 bg-white border border-gray-300 text-gray-700 font-medium rounded-lg shadow-sm hover:bg-gray-50 transition-all text-center"
        >
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
