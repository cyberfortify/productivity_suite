{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl bg-white p-6 rounded-lg shadow">
  <h2 class="text-xl font-semibold mb-4">Add Note</h2>
  <form method="post" action="/notes/add" class="space-y-4">
    <div>
      <label class="block text-sm font-medium">Title</label>
      <input name="title" required class="mt-1 w-full rounded border px-3 py-2" />
    </div>
    <div>
      <label class="block text-sm font-medium">Body</label>
      <textarea name="body" rows="6" class="mt-1 w-full rounded border px-3 py-2"></textarea>
    </div>
    <div>
      <label class="block text-sm font-medium">Tags (comma separated)</label>
      <input name="tags" class="mt-1 w-full rounded border px-3 py-2" />
    </div>
    <div class="flex gap-2">
      <button class="px-4 py-2 bg-indigo-600 text-white rounded">Save</button>
      <a href="/notes" class="px-4 py-2 bg-gray-100 rounded">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
